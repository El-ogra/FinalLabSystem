name: CI Build and Test

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore dependencies
        run: dotnet restore FinalLabSystem.sln

      - name: Build
        run: dotnet build FinalLabSystem.sln -c Release --no-restore

      - name: Test
        run: dotnet test FinalLabSystem.Tests/FinalLabSystem.Tests.csproj --no-build --verbosity normal
